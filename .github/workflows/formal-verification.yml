name: Formal Verification Specs

on:
  push:
    branches: ["main", "feat/issue-224-formal-verification"]
    paths:
      - "stellar-lend/contracts/lending/src/spec/**"
      - "stellar-lend/contracts/lending/src/**/*.rs"
      - "stellar-lend/contracts/lending/Cargo.toml"
      - ".github/workflows/formal-verification.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "stellar-lend/contracts/lending/src/spec/**"
      - "stellar-lend/contracts/lending/src/**/*.rs"
      - "stellar-lend/contracts/lending/Cargo.toml"
      - ".github/workflows/formal-verification.yml"
  # Allow manual dispatch to run the full suite at any time
  workflow_dispatch:
    inputs:
      run_kani:
        description: "Run Kani bounded model-checking harnesses (slow)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Run all spec lemma tests (fast; always-on)
  # ─────────────────────────────────────────────────────────────────────────────
  spec-lemmas:
    name: Spec Lemmas (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-lend/target
          key: ${{ runner.os }}-cargo-spec-${{ hashFiles('stellar-lend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-spec-

      - name: Run formal verification spec tests
        working-directory: stellar-lend
        run: |
          cargo test -p stellarlend-lending --features spec -- spec:: \
            --test-threads=4

      - name: Verify spec tests pass with --release profile too
        working-directory: stellar-lend
        run: |
          cargo test -p stellarlend-lending --features spec --release -- spec:: \
            --test-threads=4

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Check that spec modules do NOT leak into production WASM binary
  # ─────────────────────────────────────────────────────────────────────────────
  spec-isolation:
    name: Spec Isolation (no leakage into WASM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-lend/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('stellar-lend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Build production WASM (must not include spec modules)
        working-directory: stellar-lend
        run: |
          cargo build -p stellarlend-lending --target wasm32-unknown-unknown --release

      - name: Assert spec symbol absent from WASM binary
        working-directory: stellar-lend
        run: |
          WASM_FILE=$(find target/wasm32-unknown-unknown/release -name "*.wasm" | head -1)
          echo "Checking WASM binary: $WASM_FILE"
          # Ensure the spec module identifier does not appear in the binary
          if strings "$WASM_FILE" | grep -q "lemma_"; then
            echo "ERROR: spec symbols found in production WASM binary!"
            exit 1
          fi
          echo "OK: No spec symbols in production WASM."

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Kani bounded model-checking (manual dispatch only; slow)
  # ─────────────────────────────────────────────────────────────────────────────
  kani-harnesses:
    name: Kani Model Checking
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_kani == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup

      - name: Run Kani harnesses
        working-directory: stellar-lend
        run: |
          cargo kani \
            --package stellarlend-lending \
            --features spec \
            --harness spec::interest::kani_interest_properties \
            --harness spec::collateral::kani_collateral_ratio_properties \
            --harness spec::accounting::kani_accounting_invariants \
            --harness spec::health_factor::kani_health_factor_properties \
            --unwind 8 \
            2>&1 | tee kani-report.txt
          # Fail if any harness failed verification
          grep -q "VERIFICATION FAILED" kani-report.txt && exit 1 || true

      - name: Upload Kani report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kani-verification-report
          path: stellar-lend/kani-report.txt
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Clippy lint of spec modules
  # ─────────────────────────────────────────────────────────────────────────────
  spec-lint:
    name: Clippy Lint (spec)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-lend/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('stellar-lend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Clippy on spec modules
        working-directory: stellar-lend
        run: |
          cargo clippy -p stellarlend-lending --features spec -- \
            -D warnings \
            -A clippy::module_name_repetitions
